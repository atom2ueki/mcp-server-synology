name: PR Review

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}

            Review this pull request, focusing on:
            - Code quality and consistency with the rest of the codebase
            - Potential bugs or regressions
            - Security implications
            - Performance concerns

            The PR branch is checked out in the working directory.

            Use `gh pr comment` for top-level summary feedback (one comment max).
            Use mcp__github_inline_comment__create_inline_comment (with confirmed: true)
            for line-specific findings.

            Do not respond as a chat message - only post via gh / inline comment.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
