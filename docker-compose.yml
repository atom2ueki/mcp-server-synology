services:
  # Synology MCP Server with optional Xiaozhi support
  # Configure via ~/.config/synology-mcp/settings.json
  synology-mcp:
    build: .
    container_name: synology-mcp-server
    command: ["python", "main.py"]
    network_mode: host  # Allow access to local network (192.168.x.x)
    environment:
      - XDG_CONFIG_HOME=/home/mcpuser/.config
    volumes:
      - ./logs:/app/logs
      # Mount XDG config directory for settings.json
      # On macOS: ~/.config/synology-mcp -> /home/mcpuser/.config/synology-mcp
      # On Linux: ~/.config/synology-mcp -> /home/mcpuser/.config/synology-mcp
      - ${XDG_CONFIG_HOME:-$HOME/.config}/synology-mcp:/home/mcpuser/.config/synology-mcp:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
